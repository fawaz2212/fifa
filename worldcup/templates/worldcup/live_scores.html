{% extends 'worldcup/base.html' %}

{% block content %}

<h2 class="section-title mb-4 text-center">
    🔴 FIFA World Cup Live Scores
</h2>

<div id="live-scores">
    <div class="text-center">
        Loading matches...
    </div>
</div>

<script>

function loadScores() {

    fetch('/api/live-scores/')
    .then(response => response.json())
    .then(matches => {

        let todayHtml = '';
        let finishedHtml = '';
        let upcomingHtml = '';

        if (!matches || matches.length === 0) {

            document.getElementById('live-scores').innerHTML = `
                <div class="alert alert-info text-center">
                    No matches available.
                </div>
            `;
            return;
        }

        const today = new Date().toISOString().split('T')[0];

        matches.forEach(match => {

            const matchDate = match.utcDate.split('T')[0];

            let card = `

            <div class="match-card">

                <div class="group-title">
                    ${match.group || ''}
                </div>

                <div class="teams-row">

                    <div class="team-side">

                        <img
                            src="${match.homeTeam?.crest || ''}"
                            class="team-logo"
                            alt="${match.homeTeam?.name || ''}"
                        >

                        <span>
                            ${match.homeTeam?.name || ''}
                        </span>

                    </div>

                    <div class="score-box">

                        ${match.score?.fullTime?.home ?? "-"}

                        -

                        ${match.score?.fullTime?.away ?? "-"}

                        <div class="match-status">
                            ${match.status}
                        </div>

                    </div>

                    <div class="team-side">

                        <img
                            src="${match.awayTeam?.crest || ''}"
                            class="team-logo"
                            alt="${match.awayTeam?.name || ''}"
                        >

                        <span>
                            ${match.awayTeam?.name || ''}
                        </span>

                    </div>

                </div>

                <div class="match-time">
                    📅 ${new Date(match.utcDate).toLocaleString()}
                </div>

            </div>

            `;

            if (matchDate === today) {

                todayHtml += card;

            }
            else if (match.status === "FINISHED") {

                finishedHtml += card;

            }
            else {

                upcomingHtml += card;

            }

        });

        document.getElementById('live-scores').innerHTML = `

            <h3 class="text-danger mb-3">
                🔴 Today's Matches
            </h3>

            ${todayHtml || '<p>No matches today.</p>'}

            <h3 class="text-success mt-4 mb-3">
                ⚽ Recent Results
            </h3>

            ${finishedHtml || '<p>No recent results.</p>'}

            <h3 class="text-primary mt-4 mb-3">
                📅 Upcoming Fixtures
            </h3>

            ${upcomingHtml || '<p>No upcoming fixtures.</p>'}

        `;

    })
    .catch(error => {

        console.error(error);

        document.getElementById('live-scores').innerHTML = `
            <div class="alert alert-danger text-center">
                Failed to load scores.
            </div>
        `;

    });

}

loadScores();

setInterval(loadScores, 30000);

</script>

{% endblock %}
