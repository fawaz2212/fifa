{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FIFA World Cup 2026</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            🏆 FIFA 2026
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        <i class="bi bi-house-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'teams' %}">
                        <i class="bi bi-flag-fill"></i> Teams
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'players' %}">
                        <i class="bi bi-person-fill"></i> Players
                    </a>
                </li>

                
                
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{% url 'live_scores' %}">
                        🔴 Live Scores
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="{% url 'live_standings' %}">
                        🏆 Live Standings
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= MAIN CONTENT ================= -->

<div class="container mt-4 mb-5">

    {% block content %}
    {% endblock %}

</div>

<!-- ================= FOOTER ================= -->

<footer class="footer text-center py-4">

    <div class="container">

        <h5>⚽ FIFA World Cup 2026 Fan Portal</h5>

        <p class="mb-1">
            Teams • Players • Matches • Live Scores • Standings
        </p>

        <small>
            © 2026 FIFA Fan Website. Built with Django & Bootstrap.
        </small>

    </div>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
